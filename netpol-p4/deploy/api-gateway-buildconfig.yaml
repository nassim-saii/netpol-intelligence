---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: api-gateway
  namespace: netpol-system
spec:
  lookupPolicy:
    local: true
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: api-gateway
  namespace: netpol-system
spec:
  source:
    type: Binary
    binary: {}
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Dockerfile
  output:
    to:
      kind: ImageStreamTag
      name: api-gateway:latest
